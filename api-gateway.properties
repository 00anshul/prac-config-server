
# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Gateway Routes — Auth
spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://auth-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/gateway/auth/**
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=StripPrefix=1

# Gateway Routes — Delivery
spring.cloud.gateway.server.webmvc.routes[1].id=delivery-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://delivery-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/gateway/deliveries/**
spring.cloud.gateway.server.webmvc.routes[1].filters[0]=StripPrefix=1

# Gateway Routes — Tracking
spring.cloud.gateway.server.webmvc.routes[2].id=tracking-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://tracking-service
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/gateway/tracking/**
spring.cloud.gateway.server.webmvc.routes[2].filters[0]=StripPrefix=1

# Gateway Routes — Admin
spring.cloud.gateway.server.webmvc.routes[3].id=admin-service
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://admin-service
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/gateway/admin/**
spring.cloud.gateway.server.webmvc.routes[3].filters[0]=StripPrefix=1

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Server
server.port=8080

# Actuator
management.endpoints.web.exposure.include=health,info

